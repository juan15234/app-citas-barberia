<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../static/style/registro_style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
        <div class="vista-registro">

            <h3>The</h3>
            <h2>Barber Factory</h2>
            <span>The Best BarberShop</span>

        </div>

        <form class="form-registro" method="POST" action="/registro">

            <h1>Registro</h1>

            <input type="text" name="nombre"  placeholder="" required>
            <label for="name" class="nombre-label">👤Nombre de usuario</label>

            <input type="password" name="contraseña"  placeholder="" required>
            <label for="password" class="contraseña-label">🔒Contraseña</label>

            <input type="email" name="email" placeholder="" required>
            <label for="email" class="email-label">✉️Email</label>

            <input type="telefono" name="telefono" placeholder="" required>
            <label for="telefono" class="telefono-label">📞Número de telefono</label>

            <div class="btn-1">
                <button type="submit"><span>Registrate</span></button>
            </div>

            <a id="a-registro">Ya tienes una cuenta?...Inicia Sesión</a>

            {% if mensaje %}
                <div class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                    {{ mensaje }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

        </form>

        <form class="form-login move-left" method="POST" action="/login">

            <h1>Inicio Sesión</h1>

            <input type="text" name="nombre"  placeholder="" required>
            <label for="name" class="nombre-label">👤Nombre de usuario</label>

            <input type="password" name="contraseña"  placeholder="" required>
            <label for="password" class="contraseña-label">🔒Contraseña</label>

            <div class="btn-1">
                <button type="submit"><span>Iniciar Sesión</span></button>
            </div>

            <a id="a-login" >Aún no tienes una cuenta?...Registrate</a>

            {% if mensaje %}
                <div class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
                    {{ mensaje }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

        </form>

        <script>
            const btnRegistro = document.getElementById("a-registro");
            const btnLogin = document.getElementById("a-login");
            const formRegistro = document.querySelector(".form-registro");
            const formLogin = document.querySelector(".form-login");

            btnRegistro.addEventListener("click", function (e) {
              e.preventDefault();
              formRegistro.classList.add("move-left");
              formLogin.classList.add("move-right");
              formRegistro.classList.remove("move-right");
              formLogin.classList.remove("move-left");
            });
        
            btnLogin.addEventListener("click", function (e) {
              e.preventDefault();
              formLogin.classList.add("move-left");
              formRegistro.classList.add("move-right");
              formLogin.classList.remove("move-right");
              formRegistro.classList.remove("move-left");
            });


        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
